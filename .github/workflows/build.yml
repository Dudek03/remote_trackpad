name: build-and-test

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libglib2.0-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libatk1.0-dev libgtk-3-dev libxdo-dev
      - name: Debug pkg-config
        if: runner.os == 'Linux'
        run: |
          echo 'pkg-config gdk-3.0 version:'
          pkg-config --modversion gdk-3.0 || true
          echo 'pkg-config list for relevant modules:'
          pkg-config --list-all | grep -E 'gdk|gtk|pango|glib' || true
          echo 'pkgconfig dir listing:'
          ls -la /usr/lib/x86_64-linux-gnu/pkgconfig || true
      - name: Extra backend debug
        if: runner.os == 'Linux'
        run: |
          echo 'PKG_CONFIG_PATH='$PKG_CONFIG_PATH
          echo 'pkg-config pc_path:'
          pkg-config --variable pc_path pkg-config || true
          echo 'pkg-config cflags/libs for gdk-3.0 pango glib-2.0:'
          pkg-config --cflags --libs gdk-3.0 pango glib-2.0 || true
          echo 'dpkg listing for libgtk-3-dev (head):'
          dpkg -L libgtk-3-dev | head -n 50 || true
          echo 'env snapshot:'
          env | sort
      - name: Run backend tests
        run: cargo test --manifest-path backend/Cargo.toml

  backend-build:
    needs: backend-test
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libglib2.0-dev libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev libatk1.0-dev libgtk-3-dev
      - name: Build backend binary
        run: cargo build --release --manifest-path backend/Cargo.toml
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp backend/target/release/remote-trackpad-backend.exe artifacts/remote-trackpad-backend.exe
          else
            cp backend/target/release/remote-trackpad-backend artifacts/remote-trackpad-backend
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.os }}
          path: artifacts/

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Flutter dependencies
        run: |
          cd frontend
          flutter pub get
      - name: Flutter environment
        run: |
          cd frontend
          flutter --version || true
          dart --version || true
      - name: Run Flutter tests
        run: |
          cd frontend
          flutter test

  frontend-build-android:
    if: false
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build Android APK
        run: |
          cd frontend
          flutter pub get
          flutter build apk --release
      - name: Stage Android artifact
        run: |
          mkdir -p artifacts
          cp frontend/build/app/outputs/flutter-apk/app-release.apk artifacts/remote-trackpad-client.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/

  frontend-build-ios:
    if: false
    needs: frontend-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build iOS archive
        run: |
      backend-build:
        needs: backend-test
        strategy:
          matrix:
            os: [windows-latest]
        runs-on: ${{ matrix.os }}
        steps:
          - uses: actions/checkout@v4
          - uses: dtolnay/rust-toolchain@stable
          - name: Build backend binary
            run: cargo build --release --manifest-path backend/Cargo.toml
          - name: Stage artifacts
            shell: bash
            run: |
              mkdir -p artifacts
              if [ "$RUNNER_OS" = "Windows" ]; then
                cp backend/target/release/remote-trackpad-backend.exe artifacts/remote-trackpad-backend.exe
              else
                cp backend/target/release/remote-trackpad-backend artifacts/remote-trackpad-backend
              fi

          cd frontend
          flutter pub get
          flutter build ipa --release --no-codesign
      - name: Stage iOS artifact
        run: |
          mkdir -p artifacts
          cp frontend/build/ios/ipa/Runner.ipa artifacts/remote-trackpad-client.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: artifacts/
